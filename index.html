<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verdivurdering</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0c0c0e;
  --ground: #111114;
  --surface: #18181c;
  --raised: #1f1f24;
  --elevated: #27272d;
  --text-primary: #e8e6e1;
  --text-secondary: #8e8b82;
  --text-tertiary: #5c5952;
  --text-ghost: #3a3832;
  --border: rgba(255,255,255,0.06);
  --border-active: rgba(255,255,255,0.12);
  --border-strong: rgba(255,255,255,0.18);
  --accent: #c4a35a;
  --accent-dim: rgba(196,163,90,0.12);
  --accent-glow: rgba(196,163,90,0.06);
  --positive: #4a9e6d;
  --positive-bg: rgba(74,158,109,0.08);
  --positive-border: rgba(74,158,109,0.2);
  --caution: #b89840;
  --caution-bg: rgba(184,152,64,0.08);
  --caution-border: rgba(184,152,64,0.2);
  --negative: #c45a5a;
  --negative-bg: rgba(196,90,90,0.08);
  --negative-border: rgba(196,90,90,0.2);
  --display: 'Fraunces', Georgia, serif;
  --body: 'Outfit', system-ui, sans-serif;
  --mono: 'Fira Code', monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--body);
  background: var(--void);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
}
::selection { background: var(--accent-dim); color: var(--accent); }
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 128px;
  pointer-events: none;
  z-index: 9999;
}
.app { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

.masthead { padding: 48px 0 0; margin-bottom: 48px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark { width: 32px; height: 32px; border: 1.5px solid var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; }
.brand-text h1 { font-family: var(--display); font-size: 20px; font-weight: 400; color: var(--text-primary); letter-spacing: -0.3px; line-height: 1.2; }
.brand-text span { font-size: 12px; color: var(--text-tertiary); letter-spacing: 0.3px; }

.nav { display: flex; gap: 2px; }
.nav button { font-family: var(--body); font-size: 13px; font-weight: 400; color: var(--text-tertiary); padding: 8px 16px; border: none; background: none; cursor: pointer; border-radius: 6px; transition: all 0.2s var(--ease); letter-spacing: 0.2px; }
.nav button:hover { color: var(--text-secondary); }
.nav button.on { color: var(--text-primary); background: var(--surface); }
.nav .ct { font-family: var(--mono); font-size: 10px; color: var(--text-tertiary); margin-left: 4px; opacity: 0.7; }
.panel { display: none; }
.panel.on { display: block; animation: emerge 0.5s var(--ease); }
@keyframes emerge { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.divider { height: 1px; background: var(--border); margin-bottom: 48px; }

.form-area { display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: visible; margin-bottom: 48px; }
.form-col { padding: 28px 32px; overflow: visible; }
.form-col + .form-col { border-left: 1px solid var(--border); }
.form-section-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.form-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.f-grid .f-span { grid-column: 1 / -1; }
.f { display: flex; flex-direction: column; gap: 4px; }
.f label { font-size: 11px; font-weight: 400; color: var(--text-tertiary); letter-spacing: 0.3px; }
.f input, .f select { background: var(--raised); border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; font-size: 13px; font-family: var(--body); color: var(--text-primary); transition: all 0.2s; width: 100%; }
.f input::placeholder { color: var(--text-ghost); }
.f input:focus, .f select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: var(--elevated); }
.f select { cursor: pointer; -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235c5952' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px; }
.f .hint { font-size: 10px; color: var(--text-ghost); }

.toggle-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 32px; border-top: 1px solid var(--border); grid-column: 1 / -1; }
.toggle-inner { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-tertiary); cursor: pointer; }
.tgl-track { position: relative; width: 32px; height: 18px; background: var(--elevated); border-radius: 9px; transition: background 0.2s; cursor: pointer; border: 1px solid var(--border); }
.tgl-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: var(--text-tertiary); border-radius: 50%; transition: all 0.2s var(--ease); }
.toggle-bar input { display: none; }
.toggle-bar input:checked + .tgl-track { background: var(--accent-dim); border-color: var(--accent); }
.toggle-bar input:checked + .tgl-track::after { transform: translateX(14px); background: var(--accent); }
.submit-bar { grid-column: 1 / -1; padding: 0 32px 28px; }
.submit { width: 100%; padding: 12px; font-family: var(--body); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; color: var(--void); background: var(--accent); border: none; border-radius: 8px; cursor: pointer; transition: all 0.25s var(--ease); }
.submit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-dim); }
.submit:active { transform: translateY(0); }
/* Autocomplete */
.ac-wrap { position: relative; }
.ac-wrap input { width: 100%; }
.f:has(.ac-wrap) { overflow: visible; }
.ac-list {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
  background: var(--elevated); border: 1px solid var(--border-active);
  border-radius: 6px; margin-top: 4px; max-height: 220px; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: 9px 12px; font-size: 13px; cursor: pointer;
  color: var(--text-secondary); transition: all 0.1s;
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px;
}
.ac-item-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-item:first-child { border-radius: 6px 6px 0 0; }
.ac-item:last-child { border-radius: 0 0 6px 6px; }
.ac-item:hover, .ac-item.active { background: var(--accent-dim); color: var(--text-primary); }
.ac-item .ac-score { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); }
.ac-item:hover .ac-score, .ac-item.active .ac-score { color: var(--accent); }
.ac-match { color: var(--accent); font-weight: 500; }
.ac-status {
  font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 5px;
}
.ac-status .ac-dot { width: 5px; height: 5px; border-radius: 50%; }
.ac-status.matched { color: var(--positive); }
.ac-status.matched .ac-dot { background: var(--positive); }
.ac-status.unmatched { color: var(--caution); }
.ac-status.unmatched .ac-dot { background: var(--caution); }
.ac-list::-webkit-scrollbar { width: 4px; }
.ac-list::-webkit-scrollbar-track { background: transparent; }
.ac-list::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }

/* Finn import bar */
.finn-import-bar {
  grid-column: 1 / -1;
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
}
.finn-row {
  display: flex; gap: 8px;
}
.finn-row input {
  flex: 1; background: var(--raised); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; font-size: 13px;
  font-family: var(--body); color: var(--text-primary); transition: all 0.2s;
}
.finn-row input::placeholder { color: var(--text-ghost); }
.finn-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.finn-row button {
  padding: 10px 20px; font-family: var(--body); font-size: 12px; font-weight: 500;
  background: var(--raised); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.finn-row button:hover { border-color: var(--accent); color: var(--accent); }
.finn-row button.loading { opacity: 0.5; pointer-events: none; }
#finn-status {
  font-size: 11px; margin-top: 8px; display: flex; align-items: center; gap: 5px;
}
#finn-status.ok { color: var(--positive); }
#finn-status.err { color: var(--negative); }
#finn-status .ac-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.detail { transition: opacity 0.25s, max-height 0.3s; overflow: hidden; }
.detail.off { max-height: 0; opacity: 0; margin: 0 !important; padding: 0 !important; gap: 0 !important; }

.result { display: none; margin-bottom: 64px; }
.result.show { display: block; }
.val-header { margin-bottom: 48px; animation: emerge 0.5s var(--ease); }
.val-label { font-size: 10px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
.val-name { font-family: var(--display); font-size: 36px; font-weight: 300; letter-spacing: -0.5px; line-height: 1.15; color: var(--text-primary); margin-bottom: 8px; }
.val-meta { font-size: 13px; color: var(--text-tertiary); letter-spacing: 0.2px; }

.val-strip { display: grid; grid-template-columns: 1fr 1px 1fr 1px auto; align-items: stretch; margin-bottom: 48px; animation: emerge 0.5s var(--ease) 0.1s both; }
.val-metric { padding: 0 40px 0 0; }
.val-metric:nth-child(3) { padding: 0 40px; }
.val-metric:last-child { padding: 0 0 0 40px; }
.val-sep { width: 1px; background: var(--border); align-self: stretch; }
.val-metric-number { font-family: var(--mono); font-size: 52px; font-weight: 400; line-height: 1; letter-spacing: -3px; color: var(--text-primary); margin-bottom: 8px; font-variant-numeric: tabular-nums; }
.val-metric-number .unit { font-size: 20px; font-weight: 400; color: var(--text-tertiary); letter-spacing: 0; margin-left: 4px; }
.val-metric-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-tertiary); font-weight: 400; }
.val-grade { font-family: var(--mono); font-size: 40px; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 8px; }

.verdict { padding: 20px 28px; border-radius: 10px; margin-bottom: 48px; display: flex; align-items: center; gap: 16px; animation: emerge 0.5s var(--ease) 0.15s both; }
.verdict-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.verdict.g { background: var(--positive-bg); border: 1px solid var(--positive-border); }
.verdict.g .verdict-dot { background: var(--positive); box-shadow: 0 0 8px var(--positive); }
.verdict.g .vt { color: var(--positive); }
.verdict.y { background: var(--caution-bg); border: 1px solid var(--caution-border); }
.verdict.y .verdict-dot { background: var(--caution); box-shadow: 0 0 8px var(--caution); }
.verdict.y .vt { color: var(--caution); }
.verdict.r { background: var(--negative-bg); border: 1px solid var(--negative-border); }
.verdict.r .verdict-dot { background: var(--negative); box-shadow: 0 0 8px var(--negative); }
.verdict.r .vt { color: var(--negative); }
.vt { font-weight: 600; font-size: 14px; }
.vs { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.val-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 48px; animation: emerge 0.5s var(--ease) 0.2s both; }
.val-detail-title { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-name { width: 80px; font-size: 12px; color: var(--text-secondary); }
.bar-track { flex: 1; height: 3px; background: var(--elevated); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 2px; transition: width 1s var(--ease); }
.bar-val { width: 28px; text-align: right; font-family: var(--mono); font-size: 11px; color: var(--text-secondary); }
.feedback { font-size: 12px; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; }
.feedback.ok { background: var(--positive-bg); color: var(--positive); }
.feedback.warn { background: var(--caution-bg); color: var(--caution); }
.price-line { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.price-line:last-of-type { border-bottom: none; }
.price-line .l { color: var(--text-tertiary); }
.price-line .v { color: var(--text-primary); font-weight: 500; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
.tag { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 4px; letter-spacing: 0.3px; border: 1px solid; }
.tag.pos { color: var(--positive); border-color: var(--positive-border); background: var(--positive-bg); }
.tag.neg { color: var(--negative); border-color: var(--negative-border); background: var(--negative-bg); }
.save-row { display: flex; gap: 8px; animation: emerge 0.5s var(--ease) 0.25s both; }
.save-btn { padding: 10px 20px; font-family: var(--body); font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
.save-primary { background: var(--text-primary); color: var(--void); border: none; }
.save-primary:hover { opacity: 0.85; }
.save-ghost { background: none; color: var(--text-secondary); border: 1px solid var(--border); }
.save-ghost:hover { border-color: var(--border-active); color: var(--text-primary); }
#smsg { font-size: 12px; color: var(--positive); margin-top: 8px; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
.stat-card { background: var(--surface); padding: 20px 24px; }
.stat-card .sv { font-family: var(--mono); font-size: 24px; font-weight: 400; color: var(--text-primary); letter-spacing: -1px; }
.stat-card .sl { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; letter-spacing: 0.3px; }
.actions { display: flex; gap: 8px; margin-bottom: 24px; }
.act-btn { padding: 9px 16px; font-family: var(--body); font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); transition: all 0.2s; }
.act-btn:hover { border-color: var(--border-active); color: var(--text-primary); }
.act-btn.danger { color: var(--negative); border-color: var(--negative-border); }
.act-btn.danger:hover { background: var(--negative-bg); }
.tbl-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 12px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-tertiary); background: var(--surface); border-bottom: 1px solid var(--border); font-weight: 500; }
.tbl td { padding: 14px 16px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr { transition: background 0.15s; }
.tbl tr:hover { background: var(--surface); }
.tbl .num { text-align: right; font-family: var(--mono); font-size: 12px; color: var(--text-primary); }
.tbl a { color: var(--accent); text-decoration: none; font-weight: 500; }
.tbl a:hover { text-decoration: underline; }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
.empty { text-align: center; padding: 72px 24px; color: var(--text-ghost); font-size: 14px; }
.foot { padding: 48px 0; border-top: 1px solid var(--border); margin-top: 64px; text-align: center; font-size: 12px; color: var(--text-ghost); letter-spacing: 0.3px; }

@media (max-width: 768px) {
  .app { padding: 0 20px; }
  .masthead { flex-direction: column; align-items: flex-start; gap: 16px; padding: 32px 0 0; margin-bottom: 32px; }
  .form-area { grid-template-columns: 1fr; }
  .form-col + .form-col { border-left: none; border-top: 1px solid var(--border); }
  .val-strip { grid-template-columns: 1fr; gap: 28px; }
  .val-sep { display: none; }
  .val-metric, .val-metric:nth-child(3), .val-metric:last-child { padding: 0; }
  .val-metric-number { font-size: 36px; }
  .val-detail { grid-template-columns: 1fr; gap: 36px; }
  .val-name { font-size: 26px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .f-grid { grid-template-columns: 1fr; }
  .finn-row { flex-direction: column; }
}
@media (max-width: 480px) { .stats { grid-template-columns: 1fr; } .nav { overflow-x: auto; flex-wrap: nowrap; } }
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-text">
        <h1>Verdivurdering</h1>
        <span>Brukte landeveissykler · Finn.no</span>
      </div>
    </div>
    <nav class="nav">
      <button class="on" data-t="vurder">Vurder</button>
      <button data-t="historikk">Historikk <span class="ct" id="hc">0</span></button>
      <button data-t="watchlist">Watchlist <span class="ct" id="wc">0</span></button>
    </nav>
  </header>
  <div class="divider"></div>

  <div class="panel on" id="p-vurder">
    <form id="bf" autocomplete="off">
      <div class="form-area">
        <!-- Finn URL import bar -->
        <div class="finn-import-bar">
          <div class="form-section-label">Importer fra Finn.no</div>
          <div class="finn-row">
            <input id="f-u" placeholder="Lim inn Finn-URL her..." autocomplete="off">
            <button type="button" id="finn-btn" onclick="parseFinn()">Hent data</button>
          </div>
          <div id="finn-status"></div>
        </div>
        <div class="form-col">
          <div class="form-section-label">Sykkeldata</div>
          <div class="f-grid">
            <div class="f f-span"><label>Navn</label><input id="f-n" placeholder="Canyon Aeroad CF SLX 8"></div>
            <div class="f"><label>Pris (NOK)</label><input type="number" id="f-p" placeholder="45 000" required></div>
            <div class="f"><label>Årsmodell</label><input type="number" id="f-y" placeholder="2023" required></div>
            <div class="f f-span"><label>Gruppesett</label><div class="ac-wrap" id="ac-gs"><input id="f-gs" placeholder="Skriv for å søke..." autocomplete="off"><div class="ac-list" id="acl-gs"></div></div><div class="ac-status" id="acs-gs"></div></div>
            <div class="f"><label>Rammemerke</label><div class="ac-wrap" id="ac-rm"><input id="f-rm" placeholder="Skriv for å søke..." autocomplete="off"><div class="ac-list" id="acl-rm"></div></div><div class="ac-status" id="acs-rm"></div></div>
            <div class="f"><label>Rammemateriale</label><select id="f-rmat"><option value="karbon">Karbon</option><option value="aluminium">Aluminium</option><option value="stål">Stål</option><option value="titan">Titan</option></select></div>
            <div class="f"><label>Bremser</label><select id="f-br"><option value="disc">Skivebrems</option><option value="rim">Felgbrems</option></select></div>
          </div>
        </div>
        <div class="form-col">
          <div class="form-section-label">Detaljer</div>
          <div class="f-grid">
            <div class="f detail"><label>Hjulmerke</label><div class="ac-wrap" id="ac-hm"><input id="f-hm" placeholder="Skriv for å søke..." autocomplete="off"><div class="ac-list" id="acl-hm"></div></div><div class="ac-status" id="acs-hm"></div></div>
            <div class="f detail"><label>Hjulmateriale</label><select id="f-hmat"><option value="aluminium" selected>Aluminium</option><option value="karbon">Karbon</option></select></div>
            <div class="f detail"><label>Hjulprofil</label><select id="f-hp"><option value="ukjent" selected>Ukjent</option><option value="lav">Lav</option><option value="30mm">30mm</option><option value="35mm">35mm</option><option value="40mm">40mm</option><option value="50mm">50mm</option><option value="60mm+">60mm+</option></select></div>

<script>
const W={gruppesett:.32,ramme:.26,hjulsett:.18,alder:.14,sykkeltype:.06,tilstand:.04};
const GS={"sram red etap axs":98,"sram red axs":98,"sram red etap":90,"sram red":85,"sram force etap axs":88,"sram force axs":88,"sram force etap":80,"sram force":75,"sram rival etap axs":75,"sram rival axs":75,"sram rival":60,"sram apex":45,"shimano dura-ace di2":98,"shimano dura-ace":90,"shimano ultegra di2":88,"shimano ultegra":78,"shimano 105 di2":72,"shimano 105":65,"shimano tiagra":50,"shimano sora":38,"shimano claris":25,"campagnolo super record eps":99,"campagnolo super record":92,"campagnolo record eps":90,"campagnolo record":85,"campagnolo chorus":75,"campagnolo potenza":65,"campagnolo centaur":55};
const _FM={karbon:70,aluminium:45,alu:45,"stål":35,titan:60},_FB={specialized:28,trek:26,"cervélo":30,cervelo:30,pinarello:30,colnago:28,canyon:25,bianchi:24,scott:24,giant:22,cannondale:24,factor:28,bmc:26,merida:22,wilier:24,ridley:22,orbea:22,lapierre:20,look:24,"de rosa":26,"argon 18":24,felt:18,fuji:16,cube:18,rose:18,ribble:18,vitus:16,btwin:12,triban:12,uno:14,"eddy merckx":20,dare:21,focus:20};
const _WM={karbon:70,aluminium:40,alu:40},_WP={"60mm+":25,"50mm":22,"40mm":18,"35mm":14,"30mm":10,lav:5,ukjent:8},_WB={zipp:10,enve:10,lightweight:10,roval:9,bontrager:8,hunt:7,ffwd:7,fulcrum:7,campagnolo:8,mavic:7,dtswiss:7,"dt swiss":7,shimano:6,prime:5,vision:6,reynolds:7,scope:6,elitewheels:6,novatec:4,"giant slr":7,hollowgram:8,"black inc":9,"dura-ace":10};
const _BT={aero:85,allround:80,endurance:70,gravel:65,ukjent:75},_CS={"som ny":100,velholdt:85,normal:70,brukt:50,slitt:30,ukjent:70},_SF={xxs:.88,xs:.92,s:.96,m:.98,l:1,xl:.96,xxl:.88,ukjent:1};
const _BV={pinarello:1.08,cervelo:1.05,"cervélo":1.05,colnago:1.05,factor:1.05,"de rosa":1.05,specialized:1.03,trek:1.03,bmc:1.02,scott:1,cannondale:1,bianchi:1,look:1,wilier:1,giant:.97,merida:.97,ridley:.98,orbea:.98,"argon 18":.98,dare:.97,lapierre:.96,"eddy merckx":.97,cube:.93,felt:.93,focus:.93,rose:.92,fuji:.92,ribble:.92,vitus:.9,canyon:.88,btwin:.82,triban:.82,uno:.88};
const _BK={disc:1,rim:.75,ukjent:1};
const _PM={ingen:0,"stages l":1500,"stages lr":3000,"4iiii l":1500,"4iiii lr":3000,quarq:4000,power2max:3500,"fsa powerbox":3500,"fsa power2max":3500,"sram axs pm":4000,"shimano pm":3500,"favero assioma l":1500,"favero assioma":3000,"garmin rally l":2000,"garmin rally":4000,srm:5000,sigeyi:1000,xcadey:800,"rotor inspider":3500,rotor:3000,infocrank:4000,ukjent:1500};
const _NT=[[10000,.03],[20000,.06],[40000,.08],[70000,.10],[999999,.12]];
function gV(t){let s=new Set([t]);s.add(t.replace(/-/g,' '));s.add(t.replace(/ /g,'-'));for(let v of[...s]){s.add(v.replace(/dura ace/g,'dura-ace'));s.add(v.replace(/dura-ace/g,'dura ace'));s.add(v.replace(/etap/g,'e-tap'));s.add(v.replace(/e-tap/g,'etap'));s.add(v.replace(/e tap/g,'etap'));s.add(v.replace(/di 2/g,'di2'));}for(let v of[...s]){let x=v.replace(/\br?\d{4,5}\b/g,'').replace(/\s+/g,' ').trim();if(x)s.add(x);}return s;}
function mG(raw){let c=raw.toLowerCase().trim().replace(/\b(11|12|10)-?speed\b/g,'').replace(/\bdisc\b/g,'').replace(/\s+/g,' ').trim();if(!c||c==='ukjent'||c==='?')return[null,null];for(let v of gV(c))if(GS[v]!==undefined)return[GS[v],v];for(let p of['shimano ','sram ','campagnolo '])for(let v of gV(c)){let pv=p+v;if(GS[pv]!==undefined)return[GS[pv],pv];}for(let v of gV(c))for(let[k,val]of Object.entries(GS))if(k.includes(v)||v.includes(k))return[val,k];return[null,null];}
function mP(raw){let k=raw.toLowerCase().trim();if(_PM[k]!==undefined)return[_PM[k],k];for(let[key,val]of Object.entries(_PM))if(key.includes(k)||k.includes(key))return[val,key];if(k&&k!=='ingen'&&k!=='0')return[1500,null];return[0,'ingen'];}
function aS(y){let a=new Date().getFullYear()-y;if(a<=0)return 100;if(a===1)return 95;if(a===2)return 88;if(a===3)return 80;if(a===4)return 72;if(a===5)return 64;if(a<=7)return 50;if(a<=10)return 35;return Math.max(15,35-(a-10)*3);}
function eM(s){if(s<=30)return Math.max(500,500+(s-10)*100);if(s<=50)return 2500+(s-30)*250;if(s<=65)return 7500+(s-50)*500;if(s<=75)return 15000+(s-65)*1200;if(s<=85)return 27000+(s-75)*1500;return 42000+(s-85)*3000;}
function fmt(n){return Math.round(n).toLocaleString('nb-NO');}
function gr(s){return s>=90?'A+':s>=85?'A':s>=80?'A-':s>=75?'B+':s>=70?'B':s>=65?'B-':s>=60?'C+':s>=55?'C':s>=50?'C-':s>=40?'D':'F';}
const $=id=>document.getElementById(id);
let LB=null,LR=null;
function score(b){let r={};let[gs,gn]=mG(b.gs);r.gs=gs??50;r.gn=gn;r.gok=gs!==null;r.ra=Math.min(100,(_FM[b.rmat]??40)+(_FB[b.rm.toLowerCase().trim()]??10));let hm=b.hm.toLowerCase().trim();r.hj=Math.min(100,(_WM[b.hmat]??35)+(_WP[b.hp]??8)+((hm===''||hm==='?'||hm==='ukjent')?3:(_WB[hm]??3)));r.ag=aS(b.yr);r.ty=_BT[b.type]??75;r.co=_CS[b.cond]??70;let t=W.gruppesett*r.gs+W.ramme*r.ra+W.hjulsett*r.hj+W.alder*r.ag+W.sykkeltype*r.ty+W.tilstand*r.co;let sf=_SF[b.size]??1;let ek=Math.max(-15,Math.min(15,b.ek||0));t=t*sf+ek;r.sc=Math.round(Math.max(0,Math.min(100,t))*10)/10;r.sf=sf;r.ek=ek;let mid=eM(r.sc);let bf=_BV[b.rm.toLowerCase().trim()]??1;let bkf=_BK[b.br]??1;let gL=b.gs.toLowerCase();let isE=['di2','etap','e-tap','eps','axs'].some(x=>gL.includes(x));let df=isE?1.05:1;let[pk,pn]=mP(b.pm);r.pk=pk;r.pn=pn;let am=mid*bf*bkf*df+pk;r.lav=Math.max(500,Math.round(am*.75/500)*500);r.høy=Math.round(am*1.25/500)*500;r.mid=Math.round(am);r.bf=bf;r.bkf=bkf;r.df=df;r.isE=isE;let dp=.05;for(let[l,p]of _NT){if(b.pris<=l){dp=p;break;}}let dk=Math.round(b.pris*dp);r.sale=Math.round((b.pris-dk)/500)*500;r.dp=dp;r.dk=dk;if(r.sale<r.lav){r.deal='kupp';r.dt='Kupp — under estimert verdi';}else if(r.sale<=r.høy){r.deal='ok';r.dt='Riktig priset';}else{r.deal='over';r.dt='Overpriset';}return r;}
function readF(){return{navn:$('f-n').value||'Ukjent',pris:+$('f-p').value||0,yr:+$('f-y').value||2022,gs:$('f-gs').value||'ukjent',rm:$('f-rm').value||'ukjent',rmat:$('f-rmat').value,hm:$('f-hm').value||'',hmat:$('f-hmat').value,hp:$('f-hp').value,br:$('f-br').value,pm:$('f-pm').value,type:$('f-ty').value,size:$('f-sz').value,cond:$('f-co').value,ek:+$('f-ek').value||0,url:$('f-u').value||'',note:$('f-no').value||'',dato:new Date().toISOString().slice(0,16).replace('T',' ')};}
function tglD(){let on=$('dtgl').checked;document.querySelectorAll('.detail').forEach(el=>{if(on)el.classList.remove('off');else el.classList.add('off');});}
function render(b,r){
$('rn').textContent=b.navn;$('rm').textContent=[fmt(b.pris)+' kr',b.yr,b.type,b.br,r.isE?'elektronisk':'mekanisk'].join(' · ');
$('rsn').textContent=r.sc.toFixed(1);$('rg').textContent=gr(r.sc);
$('rpv').innerHTML=fmt(r.lav)+'–'+fmt(r.høy)+'<span class="unit">kr</span>';
let bars=[['Gruppesett',r.gs],['Ramme',r.ra],['Hjulsett',r.hj],['Alder',r.ag],['Type',r.ty],['Tilstand',r.co]];
$('rb').innerHTML=bars.map(([n,s])=>`<div class="bar-row"><div class="bar-name">${n}</div><div class="bar-track"><div class="bar-fill" style="width:${s}%"></div></div><div class="bar-val">${s}</div></div>`).join('');
let fb='';
if(r.gok)fb+=`<div class="feedback ok">${r.gn} — ${r.gs} poeng</div>`;else fb+=`<div class="feedback warn">"${b.gs}" ikke gjenkjent — bruker 50</div>`;
if(r.pk>0&&r.pn)fb+=`<div class="feedback ok">${r.pn} — +${fmt(r.pk)} kr</div>`;else if(r.pk>0)fb+=`<div class="feedback warn">Ukjent wattmåler — +${fmt(r.pk)} kr</div>`;
$('rfb').innerHTML=fb;
$('rpr').innerHTML=`<div class="price-line"><span class="l">Estimert verdi</span><span class="v">${fmt(r.lav)} – ${fmt(r.høy)} kr</span></div><div class="price-line"><span class="l">Prisantydning</span><span class="v">${fmt(b.pris)} kr</span></div><div class="price-line"><span class="l">Forhandling ~${Math.round(r.dp*100)}%</span><span class="v">-${fmt(r.dk)} kr</span></div><div class="price-line"><span class="l">Est. salgspris</span><span class="v" style="font-family:var(--mono);font-weight:500">${fmt(r.sale)} kr</span></div>`;
let tags='';
if(r.bf!==1)tags+=`<span class="tag ${r.bf>1?'pos':'neg'}">${b.rm} ${r.bf>1?'↑':'↓'}${Math.round(Math.abs(r.bf-1)*100)}%</span>`;
if(r.bkf!==1)tags+=`<span class="tag neg">Felgbrems ↓${Math.round(Math.abs(r.bkf-1)*100)}%</span>`;
if(r.df!==1)tags+=`<span class="tag pos">Elektronisk ↑${Math.round(Math.abs(r.df-1)*100)}%</span>`;
if(r.pk>0)tags+=`<span class="tag pos">PM +${fmt(r.pk)} kr</span>`;
$('rfc').innerHTML=tags;
let dc=r.deal==='kupp'?'g':r.deal==='ok'?'y':'r';
$('rd').innerHTML=`<div class="verdict ${dc}"><div class="verdict-dot"></div><div><div class="vt">${r.dt}</div><div class="vs">Salgspris ${fmt(r.sale)} kr · Estimert ${fmt(r.lav)}–${fmt(r.høy)} kr</div></div></div>`;
$('res').style.display='block';$('smsg').textContent='';$('res').scrollIntoView({behavior:'smooth'});}
$('bf').addEventListener('submit',e=>{e.preventDefault();LB=readF();LR=score(LB);render(LB,LR);});
function gH(){try{return JSON.parse(localStorage.getItem('bh')||'[]')}catch{return[]}}
function sH(h){localStorage.setItem('bh',JSON.stringify(h))}
function gW(){try{return JSON.parse(localStorage.getItem('bw')||'[]')}catch{return[]}}
function sW(w){localStorage.setItem('bw',JSON.stringify(w))}
function uC(){$('hc').textContent=gH().length;$('wc').textContent=gW().length;}
function saveH(){if(!LB)return;let h=gH();h.push({...LB,sc:LR.sc,dt:LR.dt,mid:LR.mid,lav:LR.lav,høy:LR.høy,sale:LR.sale});sH(h);uC();$('smsg').textContent='Lagret i historikk';}
function saveW(){if(!LB)return;let w=gW();let i=w.findIndex(x=>x.navn===LB.navn&&x.url===LB.url);if(i>=0)w.splice(i,1);w.push({...LB,sc:LR.sc,dt:LR.dt,mid:LR.mid});sW(w);uC();$('smsg').textContent='Lagt til i watchlist';}
document.querySelectorAll('.nav button').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));this.classList.add('on');$('p-'+this.dataset.t).classList.add('on');if(this.dataset.t==='historikk')rH();if(this.dataset.t==='watchlist')rW();}));
function dd(d){let c=(d||'').includes('Kupp')?'var(--positive)':(d||'').includes('Riktig')?'var(--caution)':'var(--negative)';return`<span class="dot" style="background:${c}"></span>${d||''}`;}
function rH(){let h=gH();if(!h.length){$('htb').innerHTML='<div class="empty">Ingen vurderinger ennå</div>';$('hst').innerHTML='';return;}
let sc=h.map(x=>x.sc||0),pr=h.map(x=>x.pris||0);

$('htb').innerHTML=`<div class="tbl-wrap"><table class="tbl"><tr><th>#</th><th>Dato</th><th>Sykkel</th><th class="num">Score</th><th class="num">Pris</th><th class="num">Est.</th><th>Deal</th><th></th></tr>${h.map((e,i)=>`<tr><td>${i+1}</td><td style="color:var(--text-tertiary)">${(e.dato||'').slice(0,10)}</td><td>${e.url?`<a href="${e.url}" target="_blank">${e.navn}</a>`:e.navn}</td><td class="num">${(e.sc||0).toFixed?e.sc.toFixed(1):e.sc}</td><td class="num">${fmt(e.pris)}</td><td class="num">${fmt(e.mid||0)}</td><td>${dd(e.dt)}</td><td><button onclick="rmH(${i})" style="background:none;border:none;color:var(--negative);cursor:pointer;font-size:14px;opacity:0.4;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">×</button></td></tr>`).join('')}</table></div>`;}
function rmH(i){let h=gH();h.splice(i,1);sH(h);uC();rH();}

$('wtb').innerHTML=`<div class="tbl-wrap"><table class="tbl"><tr><th>#</th><th>Sykkel</th><th class="num">Score</th><th class="num">Pris</th><th class="num">Est.</th><th>Deal</th><th></th></tr>${w.map((e,i)=>{let r=score(e);return`<tr><td>${i+1}</td><td>${e.url?`<a href="${e.url}" target="_blank">${e.navn}</a>`:e.navn}</td><td class="num">${r.sc.toFixed(1)}</td><td class="num">${fmt(e.pris)}</td><td class="num">${fmt(r.mid)}</td><td>${dd(r.dt)}</td><td><button onclick="rmW(${i})" style="background:none;border:none;color:var(--negative);cursor:pointer;font-size:14px;opacity:0.4;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.4">×</button></td></tr>`;}).join('')}</table></div>`;}
function rmW(i){let w=gW();w.splice(i,1);sW(w);uC();rW();}
function expCSV(){let h=gH();if(!h.length){alert('Ingen data.');return;}let f=['dato','navn','url','pris','yr','gs','rm','rmat','hm','hmat','hp','br','pm','type','size','cond','ek','sc','mid','lav','høy','sale','dt','note'];let csv=f.join(',')+'\n';for(let e of h)csv+=f.map(k=>{let v=String(e[k]??'');return v.includes(',')?`"${v}"`:v;}).join(',')+'\n';let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='sykkelvurderinger.csv';a.click();}
uC();

function initAC(inputId, listId, statusId, items) {
  const inp = $(inputId), list = $(listId), status = $(statusId);
  let activeIdx = -1, filtered = [];

  function setStatus(item) {
    if (!inp.value.trim()) { status.innerHTML = ''; return; }
    if (item) {
      status.innerHTML = '<span class="ac-dot"></span>' + item.label + ' (' + item.sc + ' poeng)';
      status.className = 'ac-status matched';
    } else {
      status.innerHTML = '<span class="ac-dot"></span>Ikke gjenkjent — velg fra listen';
      status.className = 'ac-status unmatched';
    }
  }

  function hl(text, q) {
    if (!q) return text;
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i === -1) return text;
    return text.slice(0,i) + '<span class="ac-match">' + text.slice(i, i+q.length) + '</span>' + text.slice(i+q.length);
  }

  function render(query) {
    const q = (query||'').toLowerCase().trim();
    if (!q) { filtered = items.slice(); } else { filtered = items.filter(it => it.label.toLowerCase().includes(q) || it.val.includes(q)); }
    if (!filtered.length) { list.classList.remove('open'); if (q) setStatus(null); return; }
    activeIdx = -1;
    list.innerHTML = filtered.map((it, i) =>
      '<div class="ac-item" data-i="'+i+'"><span class="ac-item-label">' + hl(it.label, query) + '</span><span class="ac-score">'+it.sc+'</span></div>'
    ).join('');
    list.classList.add('open');
    const exact = items.find(it => it.val === q || it.label.toLowerCase() === q);
    setStatus(exact || (q ? null : undefined));
    if (!q) status.innerHTML = '';
  }

  function pick(item) {
    inp.value = item.label;
    list.classList.remove('open');
    setStatus(item);
    activeIdx = -1;
  }

  inp.addEventListener('input', () => render(inp.value));
  inp.addEventListener('focus', () => render(inp.value));

  inp.addEventListener('keydown', (e) => {
    if (!list.classList.contains('open') || !filtered.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, filtered.length-1); updActive(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); updActive(); }
    else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); pick(filtered[activeIdx]); }
    else if (e.key === 'Escape') { list.classList.remove('open'); }
    else if (e.key === 'Tab' && filtered.length > 0) { pick(filtered[activeIdx >= 0 ? activeIdx : 0]); }
  });

  function updActive() {
    list.querySelectorAll('.ac-item').forEach((el, i) => {
      el.classList.toggle('active', i === activeIdx);
      if (i === activeIdx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  list.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const el = e.target.closest('.ac-item');
    if (el) pick(filtered[+el.dataset.i]);
  });

  inp.addEventListener('blur', () => {
    setTimeout(() => {
      list.classList.remove('open');
      const q = inp.value.toLowerCase().trim();
      const exact = items.find(it => it.val === q || it.label.toLowerCase() === q);
      setStatus(exact || (q ? null : undefined));
      if (!q) status.innerHTML = '';
    }, 150);
  });
}

/* ═══ FINN.NO URL PARSER ═══ */
const PROXIES = [
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
];

async function fetchWithProxies(url) {
  for (const mkProxy of PROXIES) {
    try {
      const r = await fetch(mkProxy(url), {signal: AbortSignal.timeout(8000)});
      if (r.ok) { const t = await r.text(); if (t.length > 500) return t; }
    } catch(e) { /* try next */ }
  }
  throw new Error('Alle proxyer feilet');
}

async function parseFinn() {
  const url = $('f-u').value.trim();
  const status = $('finn-status');
  const btn = $('finn-btn');

  if (!url || !url.includes('finn.no')) {
    status.className = 'err';
    status.innerHTML = '<span class="ac-dot"></span>Lim inn en gyldig Finn.no-URL';
    return;
  }

  btn.classList.add('loading');
  btn.textContent = 'Henter...';
  status.className = '';
  status.innerHTML = '<span class="ac-dot" style="background:var(--accent)"></span>Kobler til Finn.no...';

  try {
    const html = await fetchWithProxies(url);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const allText = doc.body?.textContent || '';
    const textLower = allText.toLowerCase();

    // ── Title: h1 tag ──
    const title = doc.querySelector('h1')?.textContent?.trim() || '';

    // ── Price: look for "XX XXX kr" pattern ──
    let price = 0;
    const priceMatches = allText.match(/(\d[\d\s]{1,8})\s*kr/g);
    if (priceMatches) {
      for (const pm of priceMatches) {
        const n = parseInt(pm.replace(/[^\d]/g, ''));
        if (n >= 1000 && n <= 500000 && n > price) { price = n; break; }
      }
    }

    // ── Description text: everything after "Beskrivelse" ──
    let descText = textLower;
    const descIdx = textLower.indexOf('beskrivelse');
    if (descIdx > -1) descText = textLower.slice(descIdx);
    // Also include the title
    const searchText = (title.toLowerCase() + ' ' + descText);

    // ── Year ──
    let year = 0;
    const yearMatches = searchText.match(/20[12]\d/g);
    if (yearMatches) {
      const years = yearMatches.map(Number).filter(y => y >= 2012 && y <= new Date().getFullYear() + 1);
      if (years.length) year = Math.min(...years);
    }

    // ── Groupset ──
    let gsMatch = '';
    // Try specific multi-word matches first (longest first)
    const gsSearchOrder = [...GS_DISPLAY].sort((a,b) => b.val.length - a.val.length);
    for (const gs of gsSearchOrder) {
      if (searchText.includes(gs.val) || searchText.includes(gs.label.toLowerCase())) {
        gsMatch = gs.label; break;
      }
    }
    if (!gsMatch) {
      const gsKw = ['dura-ace','dura ace','ultegra','105 di2','shimano 105','tiagra','sora','claris',
        'red etap','force etap','rival etap','red axs','force axs','rival axs',
        'super record','record eps','chorus','potenza','centaur'];
      for (const kw of gsKw) {
        if (searchText.includes(kw)) {
          const found = GS_DISPLAY.find(g => g.val.includes(kw) || g.label.toLowerCase().includes(kw));
          if (found) { gsMatch = found.label; break; }
        }
      }
    }

    // ── Frame brand (search title first, then description) ──
    let rmMatch = '';
    const rmSearchOrder = [...RM_DISPLAY].sort((a,b) => b.val.length - a.val.length);
    for (const rm of rmSearchOrder) {
      if (title.toLowerCase().includes(rm.val)) { rmMatch = rm.label; break; }
    }
    if (!rmMatch) {
      for (const rm of rmSearchOrder) {
        if (searchText.includes(rm.val)) { rmMatch = rm.label; break; }
      }
    }

    // ── Wheel brand ──
    let hmMatch = '';
    for (const hm of HM_DISPLAY) {
      if (searchText.includes(hm.val)) { hmMatch = hm.label; break; }
    }

    // ── Frame material ──
    let rmat = 'karbon';
    if (searchText.includes('aluminium') || searchText.includes('alu ') || searchText.includes('alloy')) rmat = 'aluminium';
    if (searchText.includes('titan')) rmat = 'titan';
    if (searchText.includes('stål') || searchText.includes('steel') || searchText.includes('cromoly')) rmat = 'stål';

    // ── Brakes ──
    let brakes = 'disc';
    if (searchText.includes('felgbrems') || searchText.includes('rim brake') || searchText.includes('caliper')) brakes = 'rim';

    // ── Bike type ──
    let bikeType = 'allround';
    if (searchText.includes('aero') || searchText.includes('reacto') || searchText.includes('venge') || searchText.includes('madone') || searchText.includes('propel') || searchText.includes('systemsix')) bikeType = 'aero';
    else if (searchText.includes('endurance') || searchText.includes('synapse') || searchText.includes('domane') || searchText.includes('roubaix') || searchText.includes('defy')) bikeType = 'endurance';
    else if (searchText.includes('gravel') || searchText.includes('topstone') || searchText.includes('checkpoint') || searchText.includes('diverge')) bikeType = 'gravel';

    // ── Size ──
    let size = 'ukjent';
    const sizeMap = {'xxs':'xs','xs':'xs','s':'s','m':'m','l':'l','xl':'xl','xxl':'xxl'};
    const sizeMatch = searchText.match(/\bstr\.?\s*(xxs|xs|s|m|l|xl|xxl)\b/i) ||
                      searchText.match(/\b(xxs|xs|xxl|xl)\b/i);
    if (sizeMatch) { const s = sizeMatch[1].toLowerCase(); size = sizeMap[s] || 'ukjent'; }
    // Also check for cm sizes
    const cmMatch = searchText.match(/(\d{2})\s*cm/);
    if (cmMatch && size === 'ukjent') {
      const cm = parseInt(cmMatch[1]);
      if (cm <= 49) size = 'xs'; else if (cm <= 52) size = 's'; else if (cm <= 54) size = 'm';
      else if (cm <= 56) size = 'l'; else if (cm <= 58) size = 'xl'; else size = 'xxl';
    }

    // ── Condition ──
    let cond = 'ukjent';
    if (searchText.includes('som ny') || searchText.includes('ubrukt') || searchText.includes('ny i eske')) cond = 'som ny';
    else if (searchText.includes('velholdt') || searchText.includes('god stand') || searchText.includes('pent brukt')) cond = 'velholdt';
    else if (searchText.includes('brukt')) cond = 'brukt';

    // ── Power meter ──
    let pm = 'ingen';
    const pmKw = {
      'stages lr':'stages lr','stages':'stages l','quarq':'quarq','power2max':'power2max',
      'favero assioma':'favero assioma','garmin rally':'garmin rally',
      'srm':'srm','4iiii':'4iiii l','fsa powerbox':'fsa powerbox',
      'wattmåler':'ukjent','power meter':'ukjent','powermeter':'ukjent'
    };
    for (const [kw, val] of Object.entries(pmKw)) {
      if (searchText.includes(kw)) { pm = val; break; }
    }

    // ── Fill form ──
    let filled = [];
    if (title) { $('f-n').value = title; filled.push('navn'); }
    if (price) { $('f-p').value = price; filled.push('pris'); }
    if (year) { $('f-y').value = year; filled.push('år'); }
    if (gsMatch) { $('f-gs').value = gsMatch; filled.push('gruppesett'); }
    if (rmMatch) { $('f-rm').value = rmMatch; filled.push('ramme'); }
    $('f-rmat').value = rmat;
    $('f-br').value = brakes;
    if (hmMatch) { $('f-hm').value = hmMatch; filled.push('hjul'); }
    $('f-ty').value = bikeType;
    if (size !== 'ukjent') { $('f-sz').value = size; filled.push('størrelse'); }
    if (cond !== 'ukjent') { $('f-co').value = cond; filled.push('tilstand'); }
    if (pm !== 'ingen') { $('f-pm').value = pm; filled.push('wattmåler'); }

    // Trigger autocomplete status updates
    ['f-gs','f-rm','f-hm'].forEach(id => {
      $(id).dispatchEvent(new Event('input'));
      setTimeout(() => $(id).dispatchEvent(new Event('blur')), 200);
    });

    status.className = 'ok';
    status.innerHTML = '<span class="ac-dot"></span>Hentet ' + filled.length + ' felter: ' + filled.join(', ') + '. Kontroller og juster.';

  } catch (err) {
    status.className = 'err';
    status.innerHTML = '<span class="ac-dot"></span>Kunne ikke hente — Finn blokkerer trolig forespørselen. Fyll inn manuelt.';
    console.error('Finn parse error:', err);
  } finally {
    btn.classList.remove('loading');
    btn.textContent = 'Hent data';
  }
}
