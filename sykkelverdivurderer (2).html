<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verdivurdering — Brukte landeveissykler</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Libre+Franklin:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf8f5;--white:#ffffff;--ink:#1a1815;--ink2:#4a4740;--ink3:#8a857c;--ink4:#beb8ad;
  --line:#e8e4de;--line2:#d4cfc6;--surface:#f2efe9;
  --forest:#2d5a3d;--forest-light:#e8f0ea;--forest-mid:#4a8c62;
  --amber:#b8860b;--amber-light:#fdf6e3;
  --rose:#8b3a3a;--rose-light:#fdf0f0;
  --r:6px;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Libre Franklin',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.6}
::selection{background:var(--forest-light);color:var(--forest)}

.wrap{max-width:720px;margin:0 auto;padding:0 24px 80px}

/* Header */
.masthead{padding:48px 0 40px;border-bottom:1px solid var(--ink);margin-bottom:32px}
.masthead h1{font-family:var(--serif);font-size:36px;font-weight:400;letter-spacing:-0.5px;line-height:1.1}
.masthead p{font-size:13px;color:var(--ink3);margin-top:8px;letter-spacing:0.3px}

/* Nav */
.nav{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:28px}
.nav button{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink3);padding:12px 20px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.nav button:hover{color:var(--ink)}
.nav button.on{color:var(--ink);border-bottom-color:var(--ink)}
.nav .ct{font-size:11px;background:var(--surface);color:var(--ink3);border-radius:10px;padding:1px 7px;margin-left:6px}

.panel{display:none}.panel.on{display:block}

/* Form */
.section{margin-bottom:24px}
.section-title{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid.tri{grid-template-columns:1fr 1fr 1fr}
.grid .span{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink3)}
.field input,.field select{
  background:var(--white);border:1px solid var(--line);border-radius:var(--r);
  padding:10px 12px;font-size:14px;font-family:var(--sans);color:var(--ink);transition:border .2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--ink2)}
.field select{cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238a857c' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
.field .hint{font-size:11px;color:var(--ink4)}

.submit{
  width:100%;padding:14px;font-family:var(--sans);font-size:14px;font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;color:var(--white);
  background:var(--ink);border:none;border-radius:var(--r);cursor:pointer;transition:background .2s;margin-top:8px}
.submit:hover{background:var(--ink2)}

/* Toggle */
.toggle{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--ink3)}
.toggle input{accent-color:var(--ink)}
.detail{transition:opacity .2s,max-height .3s;overflow:hidden}.detail.off{max-height:0;opacity:0;margin:0;padding:0}

/* Result */
.result{display:none;margin-top:32px}
.result-head{padding-bottom:24px;border-bottom:1px solid var(--line);margin-bottom:24px}
.result-head h2{font-family:var(--serif);font-size:28px;font-weight:400;line-height:1.2;margin-bottom:4px}
.result-head .meta{font-size:13px;color:var(--ink3)}

.score-row{display:flex;gap:32px;align-items:flex-end;margin-bottom:28px}
.big-num{font-family:var(--mono);font-size:56px;font-weight:500;line-height:1;letter-spacing:-2px}
.big-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-top:4px}
.grade-box{font-family:var(--mono);font-size:28px;font-weight:500;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);border-radius:var(--r)}

.bars{margin-bottom:28px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-name{width:90px;font-size:12px;color:var(--ink3)}
.bar-track{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--ink);border-radius:2px;transition:width .6s ease}
.bar-val{width:28px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--ink2)}

.feedback{font-size:12px;padding:8px 12px;border-radius:var(--r);margin-bottom:6px;border-left:3px solid}
.feedback.ok{background:var(--forest-light);border-color:var(--forest);color:var(--forest)}
.feedback.warn{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}

.market{background:var(--surface);border-radius:var(--r);padding:20px;margin-bottom:24px}
.market h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);margin-bottom:14px;font-weight:600}
.price-line{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid var(--line)}.price-line:last-child{border:none}
.price-line .l{color:var(--ink3)}.price-line .v{font-weight:500}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid}
.tag.pos{color:var(--forest);border-color:var(--forest-light);background:var(--forest-light)}
.tag.neg{color:var(--rose);border-color:var(--rose-light);background:var(--rose-light)}

.deal{padding:16px 20px;border-radius:var(--r);margin-bottom:24px;border-left:4px solid}
.deal.g{background:var(--forest-light);border-color:var(--forest)}.deal.g .dt{color:var(--forest)}
.deal.y{background:var(--amber-light);border-color:var(--amber)}.deal.y .dt{color:var(--amber)}
.deal.r{background:var(--rose-light);border-color:var(--rose)}.deal.r .dt{color:var(--rose)}
.deal .dt{font-weight:600;font-size:15px;margin-bottom:2px}
.deal .ds{font-size:12px;color:var(--ink3)}

.save-row{display:flex;gap:8px;margin-bottom:8px}
.save-btn{padding:8px 16px;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:0.3px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.save-primary{background:var(--ink);color:var(--white);border:none}.save-primary:hover{background:var(--ink2)}
.save-ghost{background:none;color:var(--ink);border:1px solid var(--line)}.save-ghost:hover{border-color:var(--ink2)}
#smsg{font-size:12px;color:var(--forest)}

/* History/Watchlist */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink3);border-bottom:2px solid var(--ink);font-weight:600}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--line)}
.tbl tr:hover{background:var(--surface)}
.tbl .num{text-align:right;font-family:var(--mono);font-size:12px}
.tbl a{color:var(--forest);text-decoration:none}.tbl a:hover{text-decoration:underline}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.empty{text-align:center;padding:48px 20px;color:var(--ink3);font-style:italic}
.actions{display:flex;gap:8px;margin-bottom:20px}
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:12px 16px;flex:1;min-width:100px}
.stat-card .sv{font-family:var(--mono);font-size:20px;font-weight:500}.stat-card .sl{font-size:11px;color:var(--ink3);margin-top:2px}
.act-btn{padding:8px 14px;font-family:var(--sans);font-size:12px;font-weight:500;border-radius:var(--r);cursor:pointer;background:none;border:1px solid var(--line);color:var(--ink3);transition:.2s}.act-btn:hover{border-color:var(--ink2);color:var(--ink)}
.act-btn.danger{border-color:var(--rose-light);color:var(--rose)}.act-btn.danger:hover{background:var(--rose-light)}

@media(max-width:600px){.grid,.grid.tri{grid-template-columns:1fr}.score-row{flex-direction:column;gap:16px;align-items:flex-start}}
</style>
</head>
<body>
<div class="wrap">
<div class="masthead">
<h1>Verdivurdering</h1>
<p>Brukte landeveissykler · Kalibrert mot Finn.no</p>
</div>

<div class="nav">
<button class="on" data-t="vurder">Vurder</button>
<button data-t="historikk">Historikk <span class="ct" id="hc">0</span></button>
<button data-t="watchlist">Watchlist <span class="ct" id="wc">0</span></button>
</div>

<div class="panel on" id="p-vurder">
<label class="toggle"><input type="checkbox" id="dtgl" checked onchange="tglD()"> Vis alle felter</label>
<form id="bf" autocomplete="off">

<div class="section"><div class="section-title">Grunninfo</div>
<div class="grid">
<div class="field span"><label>Navn</label><input id="f-n" placeholder="Canyon Aeroad CF SLX 8"></div>
<div class="field"><label>Pris (NOK)</label><input type="number" id="f-p" placeholder="45000" required></div>
<div class="field"><label>Årsmodell</label><input type="number" id="f-y" placeholder="2023" required></div>
<div class="field span"><label>Finn-URL</label><input id="f-u" placeholder="https://finn.no/..."></div>
</div></div>

<div class="section"><div class="section-title">Komponenter</div>
<div class="grid">
<div class="field span"><label>Gruppesett</label><input id="f-gs" placeholder="shimano ultegra di2"></div>
<div class="field"><label>Rammemerke</label><input id="f-rm" placeholder="Canyon"></div>
<div class="field"><label>Rammemateriale</label><select id="f-rmat"><option value="karbon">Karbon</option><option value="aluminium">Aluminium</option><option value="stål">Stål</option><option value="titan">Titan</option></select></div>
<div class="field"><label>Bremser</label><select id="f-br"><option value="disc">Skivebrems</option><option value="rim">Felgbrems</option></select></div>
<div class="field detail"><label>Hjulmerke</label><input id="f-hm" placeholder="DT Swiss"></div>
<div class="field detail"><label>Hjulmateriale</label><select id="f-hmat"><option value="aluminium" selected>Aluminium</option><option value="karbon">Karbon</option></select></div>
<div class="field detail"><label>Hjulprofil</label><select id="f-hp"><option value="ukjent" selected>Ukjent</option><option value="lav">Lav</option><option value="30mm">30mm</option><option value="35mm">35mm</option><option value="40mm">40mm</option><option value="50mm">50mm</option><option value="60mm+">60mm+</option></select></div>
</div></div>

<div class="section detail"><div class="section-title">Detaljer</div>
<div class="grid tri">
<div class="field"><label>Wattmåler</label><select id="f-pm"><option value="ingen">Ingen</option><option value="stages l">Stages L</option><option value="stages lr">Stages LR</option><option value="quarq">Quarq</option><option value="power2max">Power2Max</option><option value="fsa powerbox">FSA Powerbox</option><option value="favero assioma">Favero Assioma</option><option value="garmin rally">Garmin Rally</option><option value="shimano pm">Shimano PM</option><option value="sram axs pm">SRAM AXS PM</option><option value="srm">SRM</option><option value="ukjent">Annen</option></select></div>
<div class="field"><label>Type</label><select id="f-ty"><option value="aero">Aero</option><option value="allround" selected>Allround</option><option value="endurance">Endurance</option><option value="gravel">Gravel</option></select></div>
<div class="field"><label>Størrelse</label><select id="f-sz"><option value="ukjent">Ukjent</option><option value="xs">XS</option><option value="s">S</option><option value="m">M</option><option value="l" selected>L (55-56)</option><option value="xl">XL</option><option value="xxl">XXL</option></select></div>
<div class="field"><label>Tilstand</label><select id="f-co"><option value="ukjent">Ukjent</option><option value="som ny">Som ny</option><option value="velholdt">Velholdt</option><option value="normal" selected>Normal</option><option value="brukt">Brukt</option><option value="slitt">Slitt</option></select></div>
<div class="field"><label>Ekstra (-15/+15)</label><input type="number" id="f-ek" value="0" min="-15" max="15"><span class="hint">Cockpit, dekk, slitasje</span></div>
<div class="field"><label>Notater</label><input id="f-no" placeholder="Valgfritt"></div>
</div></div>

<button type="submit" class="submit">Vurder sykkel</button>
</form>

<div class="result" id="res">
<div class="result-head"><h2 id="rn"></h2><div class="meta" id="rm"></div></div>

<div class="score-row">
<div><div class="big-num" id="rsn"></div><div class="big-label">Teknisk score</div></div>
<div class="grade-box" id="rg"></div>
</div>

<div class="bars" id="rb"></div>
<div id="rfb"></div>

<div class="market">
<h3>Markedsvurdering</h3>
<div id="rpr"></div>
<div class="tags" id="rfc"></div>
</div>
<div id="rd"></div>

<div class="save-row">
<button class="save-btn save-primary" onclick="saveH()">Lagre i historikk</button>
<button class="save-btn save-ghost" onclick="saveW()">Watchlist</button>
<button class="save-btn save-ghost" onclick="saveH();saveW()">Begge</button>
</div>
<div id="smsg"></div>
</div></div>

<div class="panel" id="p-historikk">
<div class="actions"><button class="act-btn" onclick="expCSV()">Eksporter CSV</button><button class="act-btn danger" onclick="if(confirm('Slette all historikk?')){sH([]);uC();rH();}">Tøm</button></div>
<div id="hst"></div><div id="htb"></div></div>

<div class="panel" id="p-watchlist"><div id="wtb"></div></div>
</div>

<script>
const W={gruppesett:.32,ramme:.26,hjulsett:.18,alder:.14,sykkeltype:.06,tilstand:.04};
const GS={"sram red etap axs":98,"sram red axs":98,"sram red etap":90,"sram red":85,"sram force etap axs":88,"sram force axs":88,"sram force etap":80,"sram force":75,"sram rival etap axs":75,"sram rival axs":75,"sram rival":60,"sram apex":45,"shimano dura-ace di2":98,"shimano dura-ace":90,"shimano ultegra di2":88,"shimano ultegra":78,"shimano 105 di2":72,"shimano 105":65,"shimano tiagra":50,"shimano sora":38,"shimano claris":25,"campagnolo super record eps":99,"campagnolo super record":92,"campagnolo record eps":90,"campagnolo record":85,"campagnolo chorus":75,"campagnolo potenza":65,"campagnolo centaur":55};
const _FM={karbon:70,aluminium:45,alu:45,"stål":35,titan:60},_FB={specialized:28,trek:26,"cervélo":30,cervelo:30,pinarello:30,colnago:28,canyon:25,bianchi:24,scott:24,giant:22,cannondale:24,factor:28,bmc:26,merida:22,wilier:24,ridley:22,orbea:22,lapierre:20,look:24,"de rosa":26,"argon 18":24,felt:18,fuji:16,cube:18,rose:18,ribble:18,vitus:16,btwin:12,triban:12,uno:14,"eddy merckx":20,dare:21,focus:20};
const _WM={karbon:70,aluminium:40,alu:40},_WP={"60mm+":25,"50mm":22,"40mm":18,"35mm":14,"30mm":10,lav:5,ukjent:8},_WB={zipp:10,enve:10,lightweight:10,roval:9,bontrager:8,hunt:7,ffwd:7,fulcrum:7,campagnolo:8,mavic:7,dtswiss:7,"dt swiss":7,shimano:6,prime:5,vision:6,reynolds:7,scope:6,elitewheels:6,novatec:4,"giant slr":7,hollowgram:8,"black inc":9,"dura-ace":10};
const _BT={aero:85,allround:80,endurance:70,gravel:65,ukjent:75},_CS={"som ny":100,velholdt:85,normal:70,brukt:50,slitt:30,ukjent:70},_SF={xxs:.88,xs:.92,s:.96,m:.98,l:1,xl:.96,xxl:.88,ukjent:1};
const _BV={pinarello:1.08,cervelo:1.05,"cervélo":1.05,colnago:1.05,factor:1.05,"de rosa":1.05,specialized:1.03,trek:1.03,bmc:1.02,scott:1,cannondale:1,bianchi:1,look:1,wilier:1,giant:.97,merida:.97,ridley:.98,orbea:.98,"argon 18":.98,dare:.97,lapierre:.96,"eddy merckx":.97,cube:.93,felt:.93,focus:.93,rose:.92,fuji:.92,ribble:.92,vitus:.9,canyon:.88,btwin:.82,triban:.82,uno:.88};
const _BK={disc:1,rim:.75,ukjent:1};
const _PM={ingen:0,"stages l":1500,"stages lr":3000,"4iiii l":1500,"4iiii lr":3000,quarq:4000,power2max:3500,"fsa powerbox":3500,"fsa power2max":3500,"sram axs pm":4000,"shimano pm":3500,"favero assioma l":1500,"favero assioma":3000,"garmin rally l":2000,"garmin rally":4000,srm:5000,sigeyi:1000,xcadey:800,"rotor inspider":3500,rotor:3000,infocrank:4000,ukjent:1500};
const _NT=[[10000,.03],[20000,.06],[40000,.08],[70000,.10],[999999,.12]];

function gV(t){let s=new Set([t]);s.add(t.replace(/-/g,' '));s.add(t.replace(/ /g,'-'));for(let v of[...s]){s.add(v.replace(/dura ace/g,'dura-ace'));s.add(v.replace(/dura-ace/g,'dura ace'));s.add(v.replace(/etap/g,'e-tap'));s.add(v.replace(/e-tap/g,'etap'));s.add(v.replace(/e tap/g,'etap'));s.add(v.replace(/di 2/g,'di2'));}for(let v of[...s]){let x=v.replace(/\br?\d{4,5}\b/g,'').replace(/\s+/g,' ').trim();if(x)s.add(x);}return s;}
function mG(raw){let c=raw.toLowerCase().trim().replace(/\b(11|12|10)-?speed\b/g,'').replace(/\bdisc\b/g,'').replace(/\s+/g,' ').trim();if(!c||c==='ukjent'||c==='?')return[null,null];for(let v of gV(c))if(GS[v]!==undefined)return[GS[v],v];for(let p of['shimano ','sram ','campagnolo '])for(let v of gV(c)){let pv=p+v;if(GS[pv]!==undefined)return[GS[pv],pv];}for(let v of gV(c))for(let[k,val]of Object.entries(GS))if(k.includes(v)||v.includes(k))return[val,k];return[null,null];}
function mP(raw){let k=raw.toLowerCase().trim();if(_PM[k]!==undefined)return[_PM[k],k];for(let[key,val]of Object.entries(_PM))if(key.includes(k)||k.includes(key))return[val,key];if(k&&k!=='ingen'&&k!=='0')return[1500,null];return[0,'ingen'];}
function aS(y){let a=new Date().getFullYear()-y;if(a<=0)return 100;if(a===1)return 95;if(a===2)return 88;if(a===3)return 80;if(a===4)return 72;if(a===5)return 64;if(a<=7)return 50;if(a<=10)return 35;return Math.max(15,35-(a-10)*3);}
function eM(s){if(s<=30)return Math.max(500,500+(s-10)*100);if(s<=50)return 2500+(s-30)*250;if(s<=65)return 7500+(s-50)*500;if(s<=75)return 15000+(s-65)*1200;if(s<=85)return 27000+(s-75)*1500;return 42000+(s-85)*3000;}
function fmt(n){return Math.round(n).toLocaleString('nb-NO');}
function gr(s){return s>=90?'A+':s>=85?'A':s>=80?'A-':s>=75?'B+':s>=70?'B':s>=65?'B-':s>=60?'C+':s>=55?'C':s>=50?'C-':s>=40?'D':'F';}
const $=id=>document.getElementById(id);

let LB=null,LR=null;

function score(b){let r={};let[gs,gn]=mG(b.gs);r.gs=gs??50;r.gn=gn;r.gok=gs!==null;r.ra=Math.min(100,(_FM[b.rmat]??40)+(_FB[b.rm.toLowerCase().trim()]??10));let hm=b.hm.toLowerCase().trim();r.hj=Math.min(100,(_WM[b.hmat]??35)+(_WP[b.hp]??8)+((hm===''||hm==='?'||hm==='ukjent')?3:(_WB[hm]??3)));r.ag=aS(b.yr);r.ty=_BT[b.type]??75;r.co=_CS[b.cond]??70;let t=W.gruppesett*r.gs+W.ramme*r.ra+W.hjulsett*r.hj+W.alder*r.ag+W.sykkeltype*r.ty+W.tilstand*r.co;let sf=_SF[b.size]??1;let ek=Math.max(-15,Math.min(15,b.ek||0));t=t*sf+ek;r.sc=Math.round(Math.max(0,Math.min(100,t))*10)/10;r.sf=sf;r.ek=ek;let mid=eM(r.sc);let bf=_BV[b.rm.toLowerCase().trim()]??1;let bkf=_BK[b.br]??1;let gL=b.gs.toLowerCase();let isE=['di2','etap','e-tap','eps','axs'].some(x=>gL.includes(x));let df=isE?1.05:1;let[pk,pn]=mP(b.pm);r.pk=pk;r.pn=pn;let am=mid*bf*bkf*df+pk;r.lav=Math.max(500,Math.round(am*.75/500)*500);r.høy=Math.round(am*1.25/500)*500;r.mid=Math.round(am);r.bf=bf;r.bkf=bkf;r.df=df;r.isE=isE;let dp=.05;for(let[l,p]of _NT){if(b.pris<=l){dp=p;break;}}let dk=Math.round(b.pris*dp);r.sale=Math.round((b.pris-dk)/500)*500;r.dp=dp;r.dk=dk;if(r.sale<r.lav){r.deal='kupp';r.dt='Kupp — under estimert verdi';}else if(r.sale<=r.høy){r.deal='ok';r.dt='Riktig priset';}else{r.deal='over';r.dt='Overpriset';}return r;}

function readF(){return{navn:$('f-n').value||'Ukjent',pris:+$('f-p').value||0,yr:+$('f-y').value||2022,gs:$('f-gs').value||'ukjent',rm:$('f-rm').value||'ukjent',rmat:$('f-rmat').value,hm:$('f-hm').value||'',hmat:$('f-hmat').value,hp:$('f-hp').value,br:$('f-br').value,pm:$('f-pm').value,type:$('f-ty').value,size:$('f-sz').value,cond:$('f-co').value,ek:+$('f-ek').value||0,url:$('f-u').value||'',note:$('f-no').value||'',dato:new Date().toISOString().slice(0,16).replace('T',' ')};}

function tglD(){let on=$('dtgl').checked;document.querySelectorAll('.detail').forEach(el=>{if(on)el.classList.remove('off');else el.classList.add('off');});}

function render(b,r){
$('rn').textContent=b.navn;$('rm').textContent=[fmt(b.pris)+' kr',b.yr,b.type,b.br,r.isE?'elektronisk':'mekanisk'].join(' · ');
$('rsn').textContent=r.sc.toFixed(1);$('rg').textContent=gr(r.sc);
let bars=[['Gruppesett',r.gs],['Ramme',r.ra],['Hjulsett',r.hj],['Alder',r.ag],['Type',r.ty],['Tilstand',r.co]];
$('rb').innerHTML=bars.map(([n,s])=>`<div class="bar-row"><div class="bar-name">${n}</div><div class="bar-track"><div class="bar-fill" style="width:${s}%"></div></div><div class="bar-val">${s}</div></div>`).join('');
let fb='';
if(r.gok)fb+=`<div class="feedback ok">${r.gn} — ${r.gs} poeng</div>`;else fb+=`<div class="feedback warn">"${b.gs}" ikke gjenkjent — bruker 50</div>`;
if(r.pk>0&&r.pn)fb+=`<div class="feedback ok">${r.pn} — +${fmt(r.pk)} kr</div>`;else if(r.pk>0)fb+=`<div class="feedback warn">Ukjent wattmåler — +${fmt(r.pk)} kr</div>`;
$('rfb').innerHTML=fb;
$('rpr').innerHTML=`<div class="price-line"><span class="l">Estimert verdi</span><span class="v">${fmt(r.lav)} – ${fmt(r.høy)} kr</span></div><div class="price-line"><span class="l">Prisantydning</span><span class="v">${fmt(b.pris)} kr</span></div><div class="price-line"><span class="l">Forhandling ~${Math.round(r.dp*100)}%</span><span class="v">-${fmt(r.dk)} kr</span></div><div class="price-line"><span class="l">Est. salgspris</span><span class="v" style="font-family:var(--mono)">${fmt(r.sale)} kr</span></div>`;
let tags='';
if(r.bf!==1)tags+=`<span class="tag ${r.bf>1?'pos':'neg'}">${b.rm} ${r.bf>1?'↑':'↓'}${Math.round(Math.abs(r.bf-1)*100)}%</span>`;
if(r.bkf!==1)tags+=`<span class="tag neg">Felgbrems ↓${Math.round(Math.abs(r.bkf-1)*100)}%</span>`;
if(r.df!==1)tags+=`<span class="tag pos">Elektronisk ↑${Math.round(Math.abs(r.df-1)*100)}%</span>`;
if(r.pk>0)tags+=`<span class="tag pos">PM +${fmt(r.pk)} kr</span>`;
$('rfc').innerHTML=tags;
let dc=r.deal==='kupp'?'g':r.deal==='ok'?'y':'r';
$('rd').innerHTML=`<div class="deal ${dc}"><div class="dt">${r.dt}</div><div class="ds">Salgspris ${fmt(r.sale)} kr · Estimert ${fmt(r.lav)}–${fmt(r.høy)} kr</div></div>`;
$('res').style.display='block';$('smsg').textContent='';$('res').scrollIntoView({behavior:'smooth'});}

$('bf').addEventListener('submit',e=>{e.preventDefault();LB=readF();LR=score(LB);render(LB,LR);});

function gH(){try{return JSON.parse(localStorage.getItem('bh')||'[]')}catch{return[]}}
function sH(h){localStorage.setItem('bh',JSON.stringify(h))}
function gW(){try{return JSON.parse(localStorage.getItem('bw')||'[]')}catch{return[]}}
function sW(w){localStorage.setItem('bw',JSON.stringify(w))}
function uC(){$('hc').textContent=gH().length;$('wc').textContent=gW().length;}
function saveH(){if(!LB)return;let h=gH();h.push({...LB,sc:LR.sc,dt:LR.dt,mid:LR.mid,lav:LR.lav,høy:LR.høy,sale:LR.sale});sH(h);uC();$('smsg').textContent='Lagret i historikk';}
function saveW(){if(!LB)return;let w=gW();let i=w.findIndex(x=>x.navn===LB.navn&&x.url===LB.url);if(i>=0)w.splice(i,1);w.push({...LB,sc:LR.sc,dt:LR.dt,mid:LR.mid});sW(w);uC();$('smsg').textContent='Lagt til i watchlist';}

document.querySelectorAll('.nav button').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));this.classList.add('on');$('p-'+this.dataset.t).classList.add('on');if(this.dataset.t==='historikk')rH();if(this.dataset.t==='watchlist')rW();}));

function dd(d){let c=(d||'').includes('Kupp')?'var(--forest)':(d||'').includes('Riktig')?'var(--amber)':'var(--rose)';return`<span class="dot" style="background:${c}"></span>${d||''}`;}

function rH(){let h=gH();if(!h.length){$('htb').innerHTML='<div class="empty">Ingen vurderinger ennå</div>';$('hst').innerHTML='';return;}
let sc=h.map(x=>x.sc||0),pr=h.map(x=>x.pris||0);
$('hst').innerHTML=`<div class="stats"><div class="stat-card"><div class="sv">${h.length}</div><div class="sl">Antall</div></div><div class="stat-card"><div class="sv">${(sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(1)}</div><div class="sl">Snitt</div></div><div class="stat-card"><div class="sv">${fmt(Math.min(...pr))}</div><div class="sl">Min pris</div></div><div class="stat-card"><div class="sv">${fmt(Math.max(...pr))}</div><div class="sl">Maks pris</div></div></div>`;
$('htb').innerHTML=`<div style="overflow-x:auto"><table class="tbl"><tr><th>#</th><th>Dato</th><th>Sykkel</th><th class="num">Score</th><th class="num">Pris</th><th class="num">Est.</th><th>Deal</th><th></th></tr>${h.map((e,i)=>`<tr><td>${i+1}</td><td>${(e.dato||'').slice(0,10)}</td><td>${e.url?`<a href="${e.url}" target="_blank">${e.navn}</a>`:e.navn}</td><td class="num">${(e.sc||0).toFixed?e.sc.toFixed(1):e.sc}</td><td class="num">${fmt(e.pris)}</td><td class="num">${fmt(e.mid||0)}</td><td>${dd(e.dt)}</td><td><button onclick="rmH(${i})" style="background:none;border:none;color:var(--rose);cursor:pointer;font-size:13px">×</button></td></tr>`).join('')}</table></div>`;}
function rmH(i){let h=gH();h.splice(i,1);sH(h);uC();rH();}

function rW(){let w=gW();if(!w.length){$('wtb').innerHTML='<div class="empty">Watchlisten er tom</div>';return;}
$('wtb').innerHTML=`<div style="overflow-x:auto"><table class="tbl"><tr><th>#</th><th>Sykkel</th><th class="num">Score</th><th class="num">Pris</th><th class="num">Est.</th><th>Deal</th><th></th></tr>${w.map((e,i)=>{let r=score(e);return`<tr><td>${i+1}</td><td>${e.url?`<a href="${e.url}" target="_blank">${e.navn}</a>`:e.navn}</td><td class="num">${r.sc.toFixed(1)}</td><td class="num">${fmt(e.pris)}</td><td class="num">${fmt(r.mid)}</td><td>${dd(r.dt)}</td><td><button onclick="rmW(${i})" style="background:none;border:none;color:var(--rose);cursor:pointer;font-size:13px">×</button></td></tr>`;}).join('')}</table></div>`;}
function rmW(i){let w=gW();w.splice(i,1);sW(w);uC();rW();}

function expCSV(){let h=gH();if(!h.length){alert('Ingen data.');return;}let f=['dato','navn','url','pris','yr','gs','rm','rmat','hm','hmat','hp','br','pm','type','size','cond','ek','sc','mid','lav','høy','sale','dt','note'];let csv=f.join(',')+'\n';for(let e of h)csv+=f.map(k=>{let v=String(e[k]??'');return v.includes(',')?`"${v}"`:v;}).join(',')+'\n';let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='sykkelvurderinger.csv';a.click();}
uC();
</script>
</body>
</html>
